name: ci

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read
  statuses: write

jobs:
  verify-runtime-contract:
    name: verify-runtime-contract
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck probes
        run: npm run typecheck:probes

      - name: Build
        run: npm run build

      - name: Probe list
        run: npm run probe:list

      - name: Probe audit
        run: npm run probe:audit

      - name: Test probes
        run: npm run test:probes

      - name: Verify aggregate
        run: npm run verify

      - name: Runtime contract
        run: npm run runtime:contract

      - name: Upload runtime contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-contract
          path: test_reports/runtime_contract_batch4_current.json
          if-no-files-found: error

  publish-combined-status:
    name: publish-combined-status
    runs-on: ubuntu-latest
    needs:
      - verify-runtime-contract
    if: always()
    steps:
      - name: Mark combined status success
        if: needs.verify-runtime-contract.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'verify-runtime-contract/combined',
              description: 'verify-runtime-contract passed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Mark combined status failure
        if: needs.verify-runtime-contract.result != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              context: 'verify-runtime-contract/combined',
              description: 'verify-runtime-contract failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
